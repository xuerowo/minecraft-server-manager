<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft 伺服器管理工具</title>
    <style>
      /* 基本的載入樣式 */
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #1a1a1a;
        color: #ffffff;
        overflow: hidden;
      }
      
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1a1a1a;
      }
      
      .loading-spinner {
        border: 3px solid #333;
        border-top: 3px solid #00aa00;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      #root {
        height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
